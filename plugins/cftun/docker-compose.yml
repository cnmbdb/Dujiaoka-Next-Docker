name: dujiao-plugin-cftun

services:
  cftun:
    image: cloudflare/cloudflared:latest
    pull_policy: always
    container_name: dujiao-plugin-cftun
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?请在 plugins/cftun/.env 中填写 TUNNEL_TOKEN}
    command: tunnel run
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - dujiao-network

networks:
  dujiao-network:
    name: dujiao-network
    external: true
