services:
  admin:
    configs:
      - source: dujiao_bot_admin_locations
        target: /etc/nginx/conf.d/dujiao-bot.locations
      - source: dujiao_bot_admin_inject
        target: /etc/nginx/conf.d/dujiao-bot.inject
    depends_on:
      - dujiao-bot
      - dujiao-bot-admin-panel

  cloudflare-tunnel:
    depends_on:
      - dujiao-bot

  dujiao-bot:
    image: ${DUJIAO_BOT_IMAGE:-ghcr.io/cnmbdb/dujioka-next-tgbot/dujiao-bot}:${DUJIAO_BOT_TAG:-latest}
    pull_policy: always
    container_name: dujiao-bot
    restart: unless-stopped
    expose:
      - "3020"
    environment:
      - TZ=Asia/Shanghai
      - DB_HOST=dujiao-postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-dujiao_db}
      - DB_USER=${DB_USER:-dujiao_user}
      - DB_PASSWORD=${DB_PASSWORD:-dujiao_password}
      - REDIS_HOST=dujiao-redis
      - REDIS_PORT=6379
      - API_INTERNAL_URL=http://api:3000
    volumes:
      - ./config/config.yml:/app/config.yml:ro
      - ./data/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3020/health', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dujiao-network
    depends_on:
      - api

  dujiao-bot-admin-panel:
    image: ${DUJIAO_BOT_IMAGE:-ghcr.io/cnmbdb/dujioka-next-tgbot/dujiao-bot}:${DUJIAO_BOT_TAG:-latest}
    pull_policy: always
    container_name: dujiao-bot-admin-panel
    restart: unless-stopped
    command: >
      sh -c "node -e \"const express=require('express');const path=require('path');const app=express();const root='/app/admin-panel/out';app.disable('x-powered-by');app.use('/_next',express.static(path.join(root,'_next'),{immutable:true,maxAge:'1y'}));app.use('/bot',express.static(path.join(root,'bot')));app.get('/panel-router',(_,res)=>res.sendFile(path.join(root,'panel-router/index.html')));app.get('/',(_,res)=>res.sendFile(path.join(root,'index.html')));app.use((req,res)=>res.status(404).sendFile(path.join(root,'404.html')));app.listen(3001,'0.0.0.0',()=>console.log('Dujiao-Bot admin panel static server listening on 3001'));\""
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/bot/settings/', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - dujiao-network

configs:
  dujiao_bot_admin_locations:
    content: |
      location ^~ /_next/ {
          proxy_pass http://dujiao-bot-admin-panel:3001/_next/;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;
          proxy_connect_timeout 60s;
          proxy_send_timeout 60s;
          proxy_read_timeout 60s;
          add_header Cache-Control "public, max-age=31536000, immutable" always;
          add_header X-Frame-Options "SAMEORIGIN" always;
      }

      location ^~ /bot/ {
          proxy_pass http://dujiao-bot-admin-panel:3001/bot/;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;
          proxy_connect_timeout 60s;
          proxy_send_timeout 60s;
          proxy_read_timeout 60s;
          add_header Cache-Control "no-store, no-cache, must-revalidate" always;
          add_header X-Frame-Options "SAMEORIGIN" always;
      }

      location ^~ /api/bot-settings/ {
          proxy_pass http://dujiao-bot:3020/api/bot-settings/;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;
          proxy_connect_timeout 60s;
          proxy_send_timeout 60s;
          proxy_read_timeout 60s;
      }

      location = /dujiao-bot/panel {
          proxy_pass http://dujiao-bot:3020/panel;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;
          add_header X-Frame-Options "SAMEORIGIN";
      }

      location ^~ /dujiao-bot/static/ {
          proxy_pass http://dujiao-bot:3020/static/;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;
          proxy_connect_timeout 60s;
          proxy_send_timeout 60s;
          proxy_read_timeout 60s;
      }

      location ^~ /dujiao-bot/ {
          proxy_pass http://dujiao-bot:3020/;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;
          proxy_connect_timeout 60s;
          proxy_send_timeout 60s;
          proxy_read_timeout 60s;
      }

      location = /panel-router {
          proxy_pass http://dujiao-bot-admin-panel:3001/panel-router;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;
          add_header X-Frame-Options "SAMEORIGIN" always;
      }

  dujiao_bot_admin_inject:
    content: |
      sub_filter '<body>' '<body><script src="/dujiao-bot/static/inject.js?v=20260704"></script>';
