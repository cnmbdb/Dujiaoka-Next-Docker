name: dujiao-plugin-appstore

services:
  appstore:
    image: ${APPSTORE_IMAGE:-ghcr.io/cnmbdb/dujioka-next-tgbot/appstore-expand}:${APPSTORE_TAG:-latest}
    pull_policy: always
    container_name: dujiao-plugin-appstore
    restart: unless-stopped
    env_file:
      - path: ${APPSTORE_ENV_FILE:-.env}
        required: false
    environment:
      PORT: 3010
      APPSTORE_TITLE: ${APPSTORE_TITLE:-Dujiao App Store}
      APPSTORE_BUTTON_TEXT: ${APPSTORE_BUTTON_TEXT:-插件商店}
      APPSTORE_STATUS_TEXT: ${APPSTORE_STATUS_TEXT:-插件管理服务已启用}
      APPSTORE_FRONTEND_URL: ${APPSTORE_FRONTEND_URL:-https://ets.txsw.top}
      APPSTORE_FRONTEND_LOGIN_PATH: ${APPSTORE_FRONTEND_LOGIN_PATH:-/login}
      APPSTORE_CATALOG_API_URL: ${APPSTORE_CATALOG_API_URL:-https://ets.txsw.top/api/extensions}
      APPSTORE_CATALOG_TTL_MS: ${APPSTORE_CATALOG_TTL_MS:-300000}
      APPSTORE_REQUEST_TIMEOUT_MS: ${APPSTORE_REQUEST_TIMEOUT_MS:-120000}
      APPSTORE_WORKDIR: /plugin/data
      APPSTORE_TARGET_ROOT: /workspace/project
      APPSTORE_TARGET_DATA_DIR: /plugin/data
      APPSTORE_PLUGIN_ROOT: /workspace/project/plugins
      APPSTORE_COMPOSE_FILE: /workspace/project/docker-compose.yml
    volumes:
      - ${APPSTORE_DATA_DIR:-./data}:/plugin/data
      - ${DUJIAO_PROJECT_ROOT:-../..}:/workspace/project
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - dujiao-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3010/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  dujiao-network:
    name: dujiao-network
    external: true
