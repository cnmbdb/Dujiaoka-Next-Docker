server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 20m;
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api {
        set $api_upstream api:3000;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ^~ /uploads/ {
        set $api_upstream api:3000;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
    }

    # App Store 是引导插件：未安装时这里按请求返回 502，但不会阻止 Admin 启动。
    location ^~ /plugins/appstore/ {
        set $appstore_upstream dujiao-plugin-appstore:3010;
        rewrite ^/plugins/appstore/(.*)$ /$1 break;
        proxy_pass http://$appstore_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }

    location = /plugins/loader.js {
        alias /usr/share/nginx/html/plugin-loader.js;
        default_type application/javascript;
        add_header Cache-Control "no-store" always;
    }

    location = /plugins/registry.json {
        alias /var/lib/dujiao/plugins/registry.json;
        default_type application/json;
        add_header Cache-Control "no-store" always;
    }

    # 每个已启用插件由 App Store 写入一个独立路由片段。
    include /var/lib/dujiao/plugins/nginx/*.conf;

    location / {
        sub_filter_once off;
        sub_filter '</head>' '<script src="/plugins/loader.js"></script></head>';
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }
}
