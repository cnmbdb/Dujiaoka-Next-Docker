app:
  secret_key: change-this-secret-key-in-production
  totp_issuer: Dujiao-Next

server:
  host: 0.0.0.0
  port: 3000
  mode: debug

database:
  driver: postgres
  dsn: host=dujiao-postgres port=5432 user=dujiao_user password=dujiao_password dbname=dujiao_db sslmode=disable

jwt:
  secret: change-this-jwt-secret-at-least-32-chars
  expire_hours: 24

user_jwt:
  secret: change-this-user-jwt-secret-32-chars
  expire_hours: 24
  remember_me_expire_hours: 168

bootstrap:
  default_admin_username: admin
  default_admin_password: admin123

redis:
  enabled: true
  host: dujiao-redis
  port: 6379
  password: ""
  db: 0
  prefix: "dj"

queue:
  enabled: true
  host: dujiao-redis
  port: 6379
  password: ""
  db: 1
  concurrency: 10
  queues:
    default: 10
    critical: 5
