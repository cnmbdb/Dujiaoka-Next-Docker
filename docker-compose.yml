services:
  # ---------------------------------------------------------------------------
  # API 服务
  # 提供后端 API 接口
  # 生产环境不开放宿主机端口，通过 Docker 内部网络或 CFTun 插件访问
  # 镜像: dujiaonext/api:${TAG}
  # ---------------------------------------------------------------------------
  api:
    image: dujiaonext/api:${TAG:-latest}
    pull_policy: always
    container_name: dujiao-next-api
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      - DB_HOST=dujiao-postgres
      - DB_PORT=5432
      - REDIS_HOST=dujiao-redis
      - REDIS_PORT=6379
      - DJ_DEFAULT_ADMIN_USERNAME=${DJ_DEFAULT_ADMIN_USERNAME:-admin}
      - DJ_DEFAULT_ADMIN_PASSWORD=${DJ_DEFAULT_ADMIN_PASSWORD:-admin123}
    volumes:
      - ./config/config.yml:/app/config.yml:ro
      - ./data/uploads:/app/public/uploads
      - ./data/logs:/app/logs
    networks:
      - dujiao-network
    depends_on:
      dujiao-postgres:
        condition: service_healthy
      dujiao-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # User 服务（用户前台）
  # 提供用户前端界面
  # 生产环境不开放宿主机端口，通过 Docker 内部网络或 CFTun 插件访问
  # 镜像: dujiaonext/user:${TAG}
  # ---------------------------------------------------------------------------
  user:
    image: dujiaonext/user:${TAG:-latest}
    pull_policy: always
    container_name: dujiao-next-user
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    volumes:
      - ./nginx/user-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - dujiao-network
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Admin 服务（后台管理）
  # 提供后台管理界面
  # 生产环境不开放宿主机端口，通过 Docker 内部网络或 CFTun 插件访问
  # 镜像: dujiaonext/admin:${TAG}
  # ---------------------------------------------------------------------------
  admin:
    image: dujiaonext/admin:${TAG:-latest}
    pull_policy: always
    container_name: dujiao-next-admin
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    volumes:
      - ./nginx/admin-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./plugins/loader.js:/usr/share/nginx/html/plugin-loader.js:ro
      - ./data/plugins:/var/lib/dujiao/plugins:ro
    networks:
      - dujiao-network
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # PostgreSQL 数据库
  # 存储应用数据
  # ---------------------------------------------------------------------------
  dujiao-postgres:
    image: postgres:15-alpine
    pull_policy: always
    container_name: dujiao-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-dujiao_db}
      - POSTGRES_USER=${DB_USER:-dujiao_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-dujiao_password}
      - TZ=Asia/Shanghai
    expose:
      - "5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      # 如果有初始化 SQL 脚本，取消下面的注释
      # - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - dujiao-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dujiao_user} -d ${DB_NAME:-dujiao_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis 缓存
  # 用于缓存和会话存储
  # ---------------------------------------------------------------------------
  dujiao-redis:
    image: redis:7-alpine
    pull_policy: always
    container_name: dujiao-redis
    restart: unless-stopped
    command: >
      sh -c "redis-server
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru"
    expose:
      - "6379"
    volumes:
      - ./data/redis:/data
    networks:
      - dujiao-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  dujiao-network:
    name: dujiao-network
    driver: bridge

# 使用 bind mount 而非命名卷（官方推荐）
# 数据存储在 ./data/ 目录下
