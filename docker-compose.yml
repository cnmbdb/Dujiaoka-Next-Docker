services:
  # ---------------------------------------------------------------------------
  # API 服务
  # 提供后端 API 接口
  # 内部网络访问，不暴露到公网
  # ---------------------------------------------------------------------------
  api:
    image: dujiaonext/api:${TAG:-latest}
    pull_policy: always
    container_name: dujiao-next-api
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      - DJ_DEFAULT_ADMIN_USERNAME=${DJ_DEFAULT_ADMIN_USERNAME:-admin}
      - DJ_DEFAULT_ADMIN_PASSWORD=${DJ_DEFAULT_ADMIN_PASSWORD:-admin123}
    volumes:
      - ./config/config.yml:/app/config.yml:ro
      - ./.env:/etc/dujiao.env:ro
      - ./data/uploads:/app/public/uploads
      - ./data/logs:/app/logs
    networks:
      - dujiao-network
    depends_on:
      dujiao-postgres:
        condition: service_healthy
      dujiao-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # User 服务（用户前台）
  # 提供用户前端界面
  # Cloudflare Tunnel 直连容器 80 端口
  # ---------------------------------------------------------------------------
  user:
    image: dujiaonext/user:${TAG:-latest}
    pull_policy: always
    container_name: dujiao-next-user
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    volumes:
      - ./.env:/etc/dujiao.env:ro
      - ./nginx/user-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - dujiao-network
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Admin 服务（后台管理）
  # 提供后台管理界面
  # Cloudflare Tunnel 直连容器 80 端口
  # ---------------------------------------------------------------------------
  admin:
    image: dujiaonext/admin:${TAG:-latest}
    pull_policy: always
    container_name: dujiao-next-admin
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    volumes:
      - ./.env:/etc/dujiao.env:ro
      - ./nginx/admin-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - dujiao-network
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # AppStore Expand（远程镜像）
  # 内部网络访问
  # ---------------------------------------------------------------------------
  appstore-expand:
    image: ${APPSTORE_IMAGE:-hfdoker2333/dujiaoka-appstore-expand}:${APPSTORE_TAG:-latest}
    pull_policy: always
    container_name: dujiaoka-appstore-expand
    restart: unless-stopped
    expose:
      - "3010"
    environment:
      - PORT=3010
      - APPSTORE_TITLE=${APPSTORE_TITLE:-Dujiaoka AppStore Expand}
      - APPSTORE_BUTTON_TEXT=${APPSTORE_BUTTON_TEXT:-扩展应用商店}
      - APPSTORE_STATUS_TEXT=${APPSTORE_STATUS_TEXT:-应用商店扩展开启}
      - APPSTORE_FRONTEND_URL=${APPSTORE_FRONTEND_URL:-https://ets.txsw.top}
      - APPSTORE_FRONTEND_LOGIN_PATH=${APPSTORE_FRONTEND_LOGIN_PATH:-/login}
      - APPSTORE_WORKDIR=/app/data
    volumes:
      - ./data/appstore-expand:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dujiao-network
    depends_on:
      - admin

  # ---------------------------------------------------------------------------
  # PostgreSQL 数据库
  # 内部网络访问，不暴露端口
  # ---------------------------------------------------------------------------
  dujiao-postgres:
    image: postgres:15-alpine
    pull_policy: always
    container_name: dujiao-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-dujiao_db}
      - POSTGRES_USER=${DB_USER:-dujiao_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-dujiao_password}
      - TZ=Asia/Shanghai
    expose:
      - "5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - dujiao-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dujiao_user} -d ${DB_NAME:-dujiao_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis 缓存
  # 内部网络访问，不暴露端口
  # ---------------------------------------------------------------------------
  dujiao-redis:
    image: redis:7-alpine
    pull_policy: always
    container_name: dujiao-redis
    restart: unless-stopped
    command: >
      sh -c "redis-server
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru"
    expose:
      - "6379"
    volumes:
      - ./data/redis:/data
    networks:
      - dujiao-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Cloudflare Tunnel
  # 将 Docker 内部网络服务通过 Cloudflare Tunnel 暴露到公网
  # CLOUDFLARE_TUNNEL_ENABLED=true/false 控制开关（.env 第 21 行）
  # TUNNEL_TOKEN 来自 .env（第 22 行）
  # 开启 Tunnel：docker compose --profile tunnel up -d
  # 关闭 Tunnel：docker compose up -d（不加 --profile）
  # ---------------------------------------------------------------------------
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: dujiao-cloudflare-tunnel
    restart: unless-stopped
    profiles:
      - tunnel
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    networks:
      - dujiao-network
    depends_on:
      - user
      - admin

networks:
  dujiao-network:
    driver: bridge
