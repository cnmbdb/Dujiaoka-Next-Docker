services:
  # ---------------------------------------------------------------------------
  # API 服务
  # 提供后端 API 接口
  # 访问地址: http://your-server-ip:3001
  # 镜像: dujiaonext/api:${TAG}
  # ---------------------------------------------------------------------------
  api:
    image: dujiaonext/api:${TAG:-latest}
    pull_policy: always
    container_name: dujiao-next-api
    restart: unless-stopped
    ports:
      - "${HOST_BIND_IP:-0.0.0.0}:${API_PORT:-3001}:3000"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      - DJ_DEFAULT_ADMIN_USERNAME=${DJ_DEFAULT_ADMIN_USERNAME:-admin}
      - DJ_DEFAULT_ADMIN_PASSWORD=${DJ_DEFAULT_ADMIN_PASSWORD:-admin123}
    volumes:
      - ./data/uploads:/app/public/uploads
      - ./data/logs:/app/logs
    networks:
      - dujiao-network
    depends_on:
      dujiao-postgres:
        condition: service_healthy
      dujiao-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # User 服务（用户前台）
  # 提供用户前端界面
  # 访问地址: http://your-server-ip:3000
  # 镜像: dujiaonext/user:${TAG}
  # ---------------------------------------------------------------------------
  user:
    image: dujiaonext/user:${TAG:-latest}
    pull_policy: always
    container_name: dujiao-next-user
    restart: unless-stopped
    ports:
      - "${HOST_BIND_IP:-0.0.0.0}:${USER_PORT:-3000}:80"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    networks:
      - dujiao-network
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Admin 服务（后台管理）
  # 提供后台管理界面
  # 访问地址: http://your-server-ip:3002
  # 镜像: dujiaonext/admin:${TAG}
  # ---------------------------------------------------------------------------
  admin:
    image: dujiaonext/admin:${TAG:-latest}
    pull_policy: always
    container_name: dujiao-next-admin
    restart: unless-stopped
    ports:
      - "${HOST_BIND_IP:-0.0.0.0}:${ADMIN_PORT:-3002}:80"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    networks:
      - dujiao-network
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # AppStore Expand（ETS 扩展应用商店接口容器）
  # ---------------------------------------------------------------------------
  appstore-expand:
    image: ${APPSTORE_IMAGE:-hfdoker2333/dujiaoka-appstore-expand}:${APPSTORE_TAG:-latest}
    pull_policy: always
    container_name: dujiaoka-appstore-expand
    restart: unless-stopped
    expose:
      - "3010"
    environment:
      - PORT=3010
      - APPSTORE_TITLE=${APPSTORE_TITLE:-Dujiaoka AppStore Expand}
      - APPSTORE_BUTTON_TEXT=${APPSTORE_BUTTON_TEXT:-扩展应用商店}
      - APPSTORE_STATUS_TEXT=${APPSTORE_STATUS_TEXT:-应用商店扩展开启}
      - APPSTORE_FRONTEND_URL=${APPSTORE_FRONTEND_URL:-https://ets.txsw.top}
      - APPSTORE_FRONTEND_LOGIN_PATH=${APPSTORE_FRONTEND_LOGIN_PATH:-/login}
      - APPSTORE_WORKDIR=/app/data
    volumes:
      - ./data/appstore-expand:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dujiao-network
    depends_on:
      - admin

  # ---------------------------------------------------------------------------
  # Dujiao Bot
  # ---------------------------------------------------------------------------
  dujiao-bot:
    image: ${DUJIAO_BOT_IMAGE:-ghcr.io/cnmbdb/dujioka-next-tgbot/dujiao-bot}:${DUJIAO_BOT_TAG:-latest}
    pull_policy: always
    container_name: dujiao-bot
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./data/logs:/app/logs
    networks:
      - dujiao-network
    depends_on:
      - api

  # ---------------------------------------------------------------------------
  # PostgreSQL 数据库
  # 存储应用数据
  # ---------------------------------------------------------------------------
  dujiao-postgres:
    image: postgres:15-alpine
    pull_policy: always
    container_name: dujiao-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-dujiao_db}
      - POSTGRES_USER=${DB_USER:-dujiao_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-dujiao_password}
      - TZ=Asia/Shanghai
    ports:
      - "${HOST_BIND_IP:-0.0.0.0}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      # 如果有初始化 SQL 脚本，取消下面的注释
      # - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - dujiao-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dujiao_user} -d ${DB_NAME:-dujiao_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis 缓存
  # 用于缓存和会话存储
  # ---------------------------------------------------------------------------
  dujiao-redis:
    image: redis:7-alpine
    pull_policy: always
    container_name: dujiao-redis
    restart: unless-stopped
    command: >
      sh -c "redis-server
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru"
    ports:
      - "${HOST_BIND_IP:-0.0.0.0}:${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - dujiao-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Cloudflare Tunnel（可选）
  # 开启方式：docker compose --profile tunnel up -d
  # ---------------------------------------------------------------------------
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: dujiao-cloudflare-tunnel
    restart: unless-stopped
    profiles:
      - tunnel
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    networks:
      - dujiao-network
    depends_on:
      - user
      - admin
      - appstore-expand

networks:
  dujiao-network:
    driver: bridge

# 使用 bind mount 而非命名卷（官方推荐）
# 数据存储在 ./data/ 目录下
